name: AI Trend Watcher Runner

on:
  push:
    branches:
      - main
  schedule:
    - cron: '15 1 * * *'  # 北京时间 09:15 (对冲 15min 延迟)
    - cron: '15 11 * * *' # 北京时间 19:15 (对冲 15min 延迟)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Agent
      env:
        DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
        GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
        WECHAT_WEBHOOK_URL: "${{ secrets.WECHAT_WEBHOOK_URL }}"
        TZ: "Asia/Shanghai"
      run: python -m src.main

    - name: Commit and Push History (Persistent Storage)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add history.json
        git commit -m "chore: update history.json [skip ci]" || echo "No changes to commit"
        git push
